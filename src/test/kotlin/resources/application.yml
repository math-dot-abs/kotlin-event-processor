spring:
  application:
    name: kotlin-event-processor
  activemq:
    broker-url: vm://localhost?broker.persistent=false
    in-memory: true
  datasource:
    url: jdbc:h2:mem:accountingDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console